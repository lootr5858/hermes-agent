# hermes-feature-probes.conf — per-feature metadata for `hermes-update-local --evaluate` (Phase 1)
#
# Lets --evaluate classify each feature vs the incoming upstream delta into:
#   FULLY_COVERED / GAP_HIDDEN / CONFLICT / COMPLEMENTARY_REVIEW /
#   COMPLEMENTARY_CLEAN / INDEPENDENT
#
# Format (pipe-delimited, one feature per line; blank lines & # comments ignored):
#   <branch> | <topic-keywords> | <owned-symbols> | <rerouted-upstream-symbols>
#
#   topic-keywords            comma-separated; matched case-insensitively against upstream commit
#                             subjects — catches absorption that lands in OTHER files. Spaces are
#                             allowed inside one keyword (e.g. "claude code").
#   owned-symbols             comma-separated DISTINCTIVE identifiers THIS feature introduces. If
#                             upstream/main now defines ALL of them, the feature is a FULLY_COVERED
#                             retire-candidate. Use specific names, not generic words
#                             (ANTHROPIC_AUTH_MODE_SUBSCRIPTION_ONLY, not bare auth_mode).
#   rerouted-upstream-symbols comma-separated upstream functions this feature overrides / wraps /
#                             injects into. If upstream changes any of them, the feature may HIDE
#                             that change even on a clean merge -> GAP_HIDDEN.
#
# Any field may be empty (keep the surrounding pipes). A feature with no row here is reported as
# REVIEW (Phase-0 evidence only). Keep in sync when you add/edit a feature branch.

# branch | topic-keywords | owned-symbols | rerouted-upstream-symbols
local/aux-async-logging | auxiliary, provider, model, logging | |
local/runtime-footer-tokens-cost | footer, tokens, token count, cost, pricing, usage | _format_tokens_io, _format_token_count, _format_cost | runtime_footer, estimate_usage_cost, usage_pricing
local/personal-wiki-guardrail | personal wiki, system prompt, tier-1, tier 1, injection, guardrail | load_personal_wiki_tier1 | build_system_prompt_parts
local/dispatch-button | dispatch, telegram, approve, inline button, handoff | |
local/anthropic-subscription-only | anthropic, subscription, oauth, claude code, billing, auth mode, setup token | ANTHROPIC_AUTH_MODE_SUBSCRIPTION_ONLY, _ANTHROPIC_SUBSCRIPTION_IGNORED_ENV_VARS, _claude_code_billing_marker, get_configured_anthropic_auth_mode, normalize_anthropic_auth_mode, resolve_anthropic_subscription_credentials, AnthropicCredentials, AnthropicAuthError | _try_anthropic, async_call_llm, resolve_runtime_provider, try_activate_fallback, init_agent, run_conversation
